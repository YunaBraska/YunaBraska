name: "[WC] Java GitHub Release"

permissions: {}

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: false
        default: ""
        description: "Existing git tag to release"
    secrets:
      BOT_TOKEN:
        required: false
      CI_TOKEN:
        required: false
    outputs:
      version:
        description: "Released version"
        value: ${{ jobs.release.outputs.version }}
      release_created:
        description: "Whether a GitHub Release was created or updated"
        value: ${{ jobs.release.outputs.release_created }}

concurrency:
  group: java-github-release-${{ github.repository }}-${{ inputs.version || github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  release:
    name: "🔖 GitHub Release"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    outputs:
      version: ${{ steps.context.outputs.version }}
      release_created: ${{ steps.publish_result.outputs.release_created }}
    env:
      INPUT_VERSION: ${{ inputs.version }}
      WRITE_TOKEN: ${{ secrets.BOT_TOKEN || secrets.CI_TOKEN || github.token }}
    steps:
      - name: "📄 Resolve Tag"
        id: context
        shell: bash
        run: |
          set -euo pipefail

          version="${INPUT_VERSION:-}"
          if [[ -z "$version" && "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          fi

          tag_name="${version#refs/tags/}"
          version="${tag_name#v}"

          if [[ -z "$version" ]]; then
            echo "No release version provided and this run is not on a tag ref" >&2
            exit 1
          fi

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: "🧑‍💻 Checkout Tag [${{ steps.context.outputs.tag_name }}]"
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: refs/tags/${{ steps.context.outputs.tag_name }}
          token: ${{ env.WRITE_TOKEN }}

      - name: "🔐 Validate Tag"
        shell: bash
        env:
          TAG_NAME: ${{ steps.context.outputs.tag_name }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          git rev-parse --verify "refs/tags/${TAG_NAME}" >/dev/null

      - name: "🔍 Read Java Info"
        id: java_info
        uses: YunaBraska/java-info-action@main

      - name: "🧾 Validate Project Version"
        shell: bash
        env:
          VERSION: ${{ steps.context.outputs.version }}
          PROJECT_VERSION: ${{ steps.java_info.outputs.project_version }}
        run: |
          set -euo pipefail

          normalized_project="${PROJECT_VERSION#v}"
          if [[ "$normalized_project" != "$VERSION" ]]; then
            echo "Project version [$normalized_project] does not match tag [$VERSION]" >&2
            exit 1
          fi

          if [[ -f version.txt ]]; then
            normalized_file_version="$(tr -d '\r\n' < version.txt)"
            normalized_file_version="${normalized_file_version#v}"
            if [[ "$normalized_file_version" != "$VERSION" ]]; then
              echo "version.txt [$normalized_file_version] does not match tag [$VERSION]" >&2
              exit 1
            fi
          fi

      - name: "☕ Setup Java [${{ steps.java_info.outputs.java_version }}] [Maven Cache]"
        if: ${{ steps.java_info.outputs.is_maven == 'true' }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ steps.java_info.outputs.java_version }}
          distribution: "temurin"
          cache: "maven"
          cache-dependency-path: |
            **/pom.xml
            **/.mvn/wrapper/maven-wrapper.properties
            **/mvnw

      - name: "☕ Setup Java [${{ steps.java_info.outputs.java_version }}] [Gradle Cache]"
        if: ${{ steps.java_info.outputs.is_gradle == 'true' }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ steps.java_info.outputs.java_version }}
          distribution: "temurin"
          cache: "gradle"
          cache-dependency-path: |
            **/build.gradle
            **/build.gradle.kts
            **/settings.gradle
            **/settings.gradle.kts
            **/gradle.properties
            **/gradle/wrapper/gradle-wrapper.properties
            **/gradlew

      - name: "☕ Setup Java [${{ steps.java_info.outputs.java_version }}]"
        if: ${{ steps.java_info.outputs.is_maven != 'true' && steps.java_info.outputs.is_gradle != 'true' }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ steps.java_info.outputs.java_version }}
          distribution: "temurin"

      - name: "🎭 Restore Playwright Cache [${{ runner.os }}]"
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-java-playwright-${{ hashFiles('**/pom.xml', '**/build.gradle*', '**/settings.gradle*', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-java-playwright-

      - name: "🏗️ Build Release Artifacts"
        shell: bash
        env:
          CMD_BUILD: ${{ steps.java_info.outputs.cmd_build }}
        run: |
          set -euo pipefail
          eval "$CMD_BUILD"

      - name: "📦 Collect Release Artifacts"
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail

          files=()
          if [[ -d target ]]; then
            while IFS= read -r file; do
              files+=("$file")
            done < <(find target -maxdepth 1 -type f -name '*.jar' | sort)
          fi
          if [[ -d build/libs ]]; then
            while IFS= read -r file; do
              files+=("$file")
            done < <(find build/libs -maxdepth 1 -type f -name '*.jar' | sort)
          fi

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No jar artifacts were produced" >&2
            exit 1
          fi

          artifact_list=""
          for file in "${files[@]}"; do
            if [[ -n "$artifact_list" ]]; then
              artifact_list+=","
            fi
            artifact_list+="$file"
          done

          echo "artifact_list=$artifact_list" >> "$GITHUB_OUTPUT"

      - name: "📝 Generate Release Notes"
        id: notes
        shell: bash
        env:
          TAG_NAME: ${{ steps.context.outputs.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          notes_file="$(mktemp)"
          previous_tag="$(git describe --tags --abbrev=0 "${TAG_NAME}^" 2>/dev/null || true)"

          extract_pom_properties() {
            local ref="$1"
            if [[ -z "$ref" ]]; then
              return 0
            fi

            git show "${ref}:pom.xml" 2>/dev/null \
              | sed -n '/<properties>/,/<\/properties>/p' \
              | sed -n 's/.*<\([A-Za-z0-9_.-]*\)>\([^<]*\)<\/\1>.*/\1=\2/p' \
              | LC_ALL=C sort -u
          }

          extract_gradle_properties() {
            local ref="$1"
            if [[ -z "$ref" ]]; then
              return 0
            fi

            git show "${ref}:gradle.properties" 2>/dev/null \
              | sed -n 's/^[[:space:]]*\([A-Za-z0-9_.-][A-Za-z0-9_.-]*\)[[:space:]]*=[[:space:]]*\(.*\)$/\1=\2/p' \
              | LC_ALL=C sort -u
          }

          declare -A previous_props=()
          declare -A current_props=()

          while IFS='=' read -r key value; do
            [[ -n "${key:-}" ]] || continue
            [[ "$key" == "version" ]] && continue
            previous_props["$key"]="$value"
          done < <( { extract_pom_properties "$previous_tag"; extract_gradle_properties "$previous_tag"; } )

          while IFS='=' read -r key value; do
            [[ -n "${key:-}" ]] || continue
            [[ "$key" == "version" ]] && continue
            current_props["$key"]="$value"
          done < <( { extract_pom_properties "$TAG_NAME"; extract_gradle_properties "$TAG_NAME"; } )

          mapfile -t changed_props < <(
            {
              for key in "${!current_props[@]}"; do
                old_value="${previous_props[$key]-__missing__}"
                new_value="${current_props[$key]}"
                if [[ "$old_value" != "$new_value" ]]; then
                  printf '%s\t%s\t%s\n' "$key" "$old_value" "$new_value"
                fi
              done
              for key in "${!previous_props[@]}"; do
                if [[ -z "${current_props[$key]+present}" ]]; then
                  printf '%s\t%s\t%s\n' "$key" "${previous_props[$key]}" "__removed__"
                fi
              done
            } | LC_ALL=C sort
          )

          mapfile -t changed_files < <(
            if [[ -n "$previous_tag" ]]; then
              git diff --name-only "$previous_tag" "$TAG_NAME" | grep -v '^version.txt$' || true
            else
              git ls-tree -r --name-only "$TAG_NAME"
            fi
          )

          {
            echo "## Summary"
            if [[ -n "$previous_tag" ]]; then
              if [[ "${#changed_props[@]}" -gt 0 ]]; then
                for entry in "${changed_props[@]}"; do
                  IFS=$'\t' read -r key old_value new_value <<< "$entry"
                  if [[ "$old_value" == "__missing__" ]]; then
                    printf -- "- `%s`: added `%s`\n" "$key" "$new_value"
                  elif [[ "$new_value" == "__removed__" ]]; then
                    printf -- "- `%s`: removed (was `%s`)\n" "$key" "$old_value"
                  else
                    printf -- "- `%s`: `%s` -> `%s`\n" "$key" "$old_value" "$new_value"
                  fi
                done
              else
                echo "- No Maven or Gradle property changes were detected for this release."
              fi
              echo
              echo "## Changed Files"
              if [[ "${#changed_files[@]}" -gt 0 ]]; then
                for file in "${changed_files[@]}"; do
                  printf -- "- `%s`\n" "$file"
                done
              else
                echo "- No tracked file changes besides `version.txt`."
              fi
              echo
              echo "## Full Changelog"
              echo "- https://github.com/${REPOSITORY}/compare/${previous_tag}...${TAG_NAME}"
            else
              echo "- First tagged release from this repository state."
            fi
          } > "$notes_file"

          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: "🚀 Create Or Update GitHub Release"
        id: publish
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: ${{ steps.artifacts.outputs.artifact_list }}
          bodyFile: ${{ steps.notes.outputs.notes_file }}
          omitBodyDuringUpdate: false
          prerelease: ${{ contains(steps.context.outputs.version, '-rc.') || contains(steps.context.outputs.version, '-beta.') || contains(steps.context.outputs.version, '-alpha.') }}
          replacesArtifacts: true
          tag: ${{ steps.context.outputs.tag_name }}
          token: ${{ env.WRITE_TOKEN }}

      - name: "🧾 Mark Release Result"
        id: publish_result
        shell: bash
        run: |
          echo "release_created=true" >> "$GITHUB_OUTPUT"
